name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          VITE_API_URL=/api npm run build

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          timeout: 15m
          script: |
            set -e
            cd /opt/papercraft

            # Pull latest code (force reset any local modifications)
            git fetch origin main
            git reset --hard origin/main

            # Backend: rebuild Docker image (no cache) and restart
            docker compose -f docker-compose.prod.yml build --no-cache backend
            docker compose -f docker-compose.prod.yml up -d backend

            echo "✅ Backend restarted"

      - name: Copy frontend build to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "frontend/dist/"
          target: "/opt/papercraft/frontend/"
          strip_components: 1

      - name: Reload nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker compose -f /opt/papercraft/docker-compose.prod.yml exec nginx nginx -s reload
            echo "✅ nginx reloaded"

      - name: Health check
        continue-on-error: true
        run: |
          echo "Waiting for backend to start..."
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://${{ secrets.SERVER_HOST }}/api/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ App live at http://${{ secrets.SERVER_HOST }}"
              exit 0
            fi
            echo "  Attempt $i: HTTP $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "❌ Health check failed after 2 minutes"
          exit 1
